{% extends "layout.html" %}

{% block body %}

<div class="auth-page">

  <!-- left panel — branding -->
  <div class="auth-brand">
    <div class="auth-brand-inner">
      <div class="brand-tag">Student Registry</div>
      <h1 class="brand-title">Track your<br>sports life.</h1>
      <p class="brand-sub">Register for activities, manage your schedule, stay active.</p>
      <div class="brand-stats">
        <div class="stat"><span class="stat-num">8+</span><span class="stat-label">Sports</span></div>
        <div class="stat-divider"></div>
        <div class="stat"><span class="stat-num">∞</span><span class="stat-label">Students</span></div>
      </div>
    </div>
  </div>

  <!-- right panel — form -->
  <div class="auth-form-panel">
    <div class="auth-form-wrap">
      <h2 class="form-title">Welcome back</h2>
      <p class="form-sub">Enter your Student ID and name to continue.</p>

      <form action="/log_in" method="POST" class="auth-form">
        <div class="field">
          <label for="id">Student ID</label>
          <input type="number" id="id" name="id" placeholder="e.g. 3" required autofocus />
        </div>
        <div class="field">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="e.g. John Smith" required />
        </div>
        <button type="submit" class="btn-primary">Log In →</button>
      </form>

      <p class="auth-switch">No account? <a href="/signup">Sign up here</a></p>
    </div>
  </div>

</div>

{% endblock %}
